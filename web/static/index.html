<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tui-streamer</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 17 10 11 4 5"/>
      <line x1="12" y1="19" x2="20" y2="19"/>
    </svg>
    tui-streamer
  </div>
  <div class="header-spacer"></div>
  <div class="header-controls">
    <select id="theme-select" class="select" title="Choose theme">
      <option value="catppuccin-macchiato">Catppuccin Macchiato</option>
      <option value="catppuccin-latte">Catppuccin Latte</option>
      <option value="catppuccin-frappe">Catppuccin Frappé</option>
      <option value="catppuccin-mocha">Catppuccin Mocha</option>
      <option value="dark">Dark</option>
      <option value="dracula">Dracula</option>
      <option value="matrix">Matrix</option>
      <option value="nord">Nord</option>
      <option value="solarized">Solarized</option>
      <option value="light">Light</option>
    </select>
    <a href="https://github.com/polds/tui-streamer" target="_blank"
       class="btn btn-icon" title="GitHub" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                 -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                 .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                 -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                 .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                 .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>
</header>

<!-- ── App body ─────────────────────────────────────────────────────── -->
<div class="app-body">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">Sessions</div>
    <div class="session-list" id="session-list"></div>
    <div class="sidebar-footer" id="sidebar-footer" style="display:flex;gap:8px;">
      <button id="btn-new-session" class="btn btn-primary" style="flex:1">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13zM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8z"/>
          <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
        </svg>
        New
      </button>
      <button id="btn-import-bundle" class="btn btn-secondary" style="flex:1" title="Import Bundle">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        Import
      </button>
      <input type="file" id="input-bundle-file" accept=".json" class="hidden" style="display:none">
    </div>
  </aside>

  <!-- Main content -->
  <main style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative">

    <!-- Empty state -->
    <div id="empty-state" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 17 10 11 4 5"/>
        <line x1="12" y1="19" x2="20" y2="19"/>
      </svg>
      <h2>No session selected</h2>
      <p>Create a new session and run any command to see its output streamed here in real time.</p>
      <button class="btn btn-primary"
              onclick="document.getElementById('btn-new-session').click()">
        Create a session
      </button>
    </div>

    <!-- Terminal panel -->
    <div id="terminal-panel" class="terminal-panel hidden">

      <div class="terminal-header">
        <div>
          <div class="terminal-title" id="term-title">—</div>
          <div class="terminal-subtitle" id="term-subtitle"></div>
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <div class="conn-badge">
            <span class="conn-dot" id="conn-dot"></span>
            <span id="conn-label">—</span>
          </div>
          <button id="btn-scroll" class="btn scroll-active" title="Toggle auto-scroll">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
              <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319z"/>
            </svg>
            Auto-scroll
          </button>
          <button id="btn-kill" class="btn" title="Kill running process"
                  style="color:var(--danger);border-color:transparent">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5z"/>
              <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3h11V2h-11v1z"/>
            </svg>
            Kill
          </button>
          <button id="btn-clear" class="btn" title="Clear terminal output">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
              <path d="M8.086 2.207a2 2 0 0 1 2.828 0l3.879 3.879a2 2 0 0 1 0 2.828l-5.5 5.5A2 2 0 0 1 7.879 15H5.12a2 2 0 0 1-1.414-.586l-2.5-2.5a2 2 0 0 1 0-2.828l6.879-6.879zm2.121.707a1 1 0 0 0-1.414 0L4.16 7.547l5.293 5.293 4.633-4.633a1 1 0 0 0 0-1.414l-3.879-3.879zM8.746 13.547 3.453 8.254 1.914 9.793a1 1 0 0 0 0 1.414l2.5 2.5a1 1 0 0 0 .707.293H7.88a1 1 0 0 0 .707-.293l.16-.16z"/>
            </svg>
            Clear
          </button>
        </div>
      </div>

      <div id="terminal-hint" class="terminal-hint hidden"></div>
      <div class="terminal-output" id="terminal-output"></div>

      <!-- Action prompt for highlighted lines -->
      <div id="sel-prompt" class="sel-prompt hidden">
        <span id="sel-count">0 lines selected</span>
        <button id="btn-sel-copy" class="btn btn-primary">Copy</button>
        <button id="btn-sel-rayso" class="btn btn-secondary">Generate Image</button>
        <button id="btn-sel-clear" class="btn btn-icon" title="Clear selection">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
          </svg>
        </button>
      </div>

      <div class="cmd-bar">
        <span class="cmd-prefix">$</span>
        <input id="cmd-input" class="cmd-input" type="text"
               placeholder="Enter a command…  e.g.  make build"
               autocomplete="off" spellcheck="false">
        <button id="btn-run" class="btn btn-success">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
            <path d="M11.596 8.697l-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/>
          </svg>
          Run
        </button>
      </div>

    </div>
  </main>
</div>

<!-- ── New session modal ─────────────────────────────────────────────── -->
<div id="modal-overlay" class="overlay hidden">
  <div class="modal">
    <h3>New Session</h3>
    <form id="form-new-session">
      <label class="field-label" for="input-session-name">Session name</label>
      <input id="input-session-name" class="field-input" type="text"
             placeholder="my-session" autocomplete="off">
      <div class="modal-actions">
        <button type="button" id="btn-cancel-new" class="btn">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
