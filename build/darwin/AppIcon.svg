<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background with macOS Big Sur-style rounded rectangle -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="#1a1b26"/>

  <!-- Subtle inner glow / gradient overlay -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2d3250" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1a1b26" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shine" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#glow)"/>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#shine)"/>

  <!-- Prompt symbol: ">" chevron in blue -->
  <!-- Two strokes forming a right-pointing chevron -->
  <polyline
    points="260,340 440,512 260,684"
    fill="none"
    stroke="#7aa2f7"
    stroke-width="80"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Underscore cursor in green, sitting below the chevron baseline -->
  <line
    x1="500" y1="700"
    x2="760" y2="700"
    stroke="#9ece6a"
    stroke-width="72"
    stroke-linecap="round"/>
</svg>
